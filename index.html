<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Districts + Cluster Map</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css"/>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet.control.layers.tree@1.1.0/L.Control.Layers.Tree.css"/>
<script src="https://unpkg.com/leaflet.control.layers.tree@1.1.0/L.Control.Layers.Tree.js"></script>

<style>
html, body { margin:0; padding:0; height:100%; }
#map { width:100%; height:100vh; }

.leaflet-control-layers {
  max-height:80vh;
  overflow:auto;
  font-size:14px;
}
</style>
</head>

<body>
<div id="map"></div>

<script>

/////////////////////////////////////////////////////
// MAP INIT
/////////////////////////////////////////////////////

const map = L.map('map').setView([26.42, 50.09], 11);

const osm = L.tileLayer(
  'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
  { attribution: '&copy; OpenStreetMap contributors' }
).addTo(map);

/////////////////////////////////////////////////////
// CLUSTER GROUP
/////////////////////////////////////////////////////

const clusterGroup = L.markerClusterGroup({
  chunkedLoading: true,
  maxClusterRadius: 50
}).addTo(map);

/////////////////////////////////////////////////////
// TOOLTIP (MATCHES GRAFANA DATA)
/////////////////////////////////////////////////////

function buildTooltip(r){
  return `
    <b>Ticket:</b> ${r.ticket ?? "N/A"}<br>
    <b>Location:</b> ${r.state ?? "N/A"}<br>
    <b>Classification:</b> ${r.classification ?? "N/A"}<br>
    <b>Status:</b> ${r.status ?? "N/A"}<br>
    <b>Lat:</b> ${r.lat}<br>
    <b>Long:</b> ${r.long}
  `;
}

/////////////////////////////////////////////////////
// RENDER MARKERS
/////////////////////////////////////////////////////

function renderMarkers(rows){

  clusterGroup.clearLayers();

  rows.forEach(r => {

    if(!r.lat || !r.long) return;

    const marker = L.marker([r.lat, r.long]);

    marker.bindTooltip(buildTooltip(r));

    // 🔥 SEND CLICK BACK TO GRAFANA
    marker.on("click", () => {
      window.parent.postMessage({
        type: "mapClick",
        state: r.state,
        lat: r.lat,
        long: r.long
      }, "*");
    });

    clusterGroup.addLayer(marker);

  });

}

/////////////////////////////////////////////////////
// DISTRICT TREE SETUP
/////////////////////////////////////////////////////

const colors = {
  "Dammam": "blue",
  "Al Khobar": "red",
  "Dhahran": "green"
};

const municipalityCodes = {
  "Dammam": "10501",
  "Al Khobar": "10506",
  "Dhahran": "10513"
};

const grouped = {
  "Dammam": [],
  "Al Khobar": [],
  "Dhahran": []
};

const boundaryLayer = L.layerGroup();

/////////////////////////////////////////////////////
// LOAD DISTRICTS
/////////////////////////////////////////////////////

fetch("districts.geojson")
.then(r => r.json())
.then(data => {

  data.features.forEach(feature => {

    const city = feature.properties.City;
    const name = feature.properties.Name;

    if (!grouped[city]) return;

    const districtLayer = L.geoJSON(feature, {
      style: {
        color: "black",
        weight: 1,
        fillColor: colors[city] || "gray",
        fillOpacity: 0.55
      }
    }).bindTooltip(`${name} (${city})`);

    grouped[city].push({
      label: name,
      layer: districtLayer
    });

    boundaryLayer.addLayer(
      L.geoJSON(feature, {
        style: {
          color: "black",
          weight: 1,
          fillOpacity: 0
        }
      })
    );
  });

  const overlaysTree = {
    label: 'Districts by Municipality',
    children: [
      {
        label: `Dammam (${municipalityCodes["Dammam"]})`,
        selectAllCheckbox: true,
        children: grouped["Dammam"]
      },
      {
        label: `Al Khobar (${municipalityCodes["Al Khobar"]})`,
        selectAllCheckbox: true,
        children: grouped["Al Khobar"]
      },
      {
        label: `Dhahran (${municipalityCodes["Dhahran"]})`,
        selectAllCheckbox: true,
        children: grouped["Dhahran"]
      },
      {
        label: "District Boundary",
        layer: boundaryLayer
      },
      {
        label: "Incidents (Cluster)",
        layer: clusterGroup
      }
    ]
  };

  L.control.layers.tree(
    { "OpenStreetMap": osm },
    overlaysTree,
    { collapsed: false }
  ).addTo(map);

});

/////////////////////////////////////////////////////
// RECEIVE DATA FROM GRAFANA
/////////////////////////////////////////////////////

window.addEventListener("message", (event) => {

  console.log("📩 Received:", event.data); // debug

  if (
    event.data?.type === "incidentData" &&
    Array.isArray(event.data.data)
  ) {
    renderMarkers(event.data.data);
  }

});

/////////////////////////////////////////////////////
// INFORM GRAFANA THAT MAP IS READY
/////////////////////////////////////////////////////

window.parent.postMessage({ type: "iframeReady" }, "*");

</script>

</body>
</html>
