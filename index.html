<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>District Map + Grafana</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.control.layers.tree@1.1.0/L.Control.Layers.Tree.css"/>

<style>
html, body { margin:0; padding:0; height:100%; }
#map { width:100%; height:100vh; }

.leaflet-control-layers {
  max-height: 80vh;
  overflow: auto;
  font-size: 13px;
}

.count-label {
  background: transparent;
  border: none;
}

.count-text {
  font-size: 16px;
  font-weight: bold;
  color: #111;
  text-shadow:
    1px 1px 0 #fff,
   -1px -1px 0 #fff,
    1px -1px 0 #fff,
   -1px 1px 0 #fff,
    0 0 4px #fff;
  white-space: nowrap;
  text-align: center;
}
</style>
</head>

<body>
<div id="map"></div>

<script defer src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script defer src="https://unpkg.com/leaflet.control.layers.tree@1.1.0/L.Control.Layers.Tree.js"></script>

<script defer>
document.addEventListener("DOMContentLoaded", function () {
  if (typeof L === "undefined") {
    alert("Leaflet not loaded");
    return;
  }

  const map = L.map("map").setView([26.42, 50.09], 11);

  const osm = L.tileLayer(
    "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
    { attribution: "&copy; OpenStreetMap contributors" }
  ).addTo(map);

  const boundaryLayer = L.layerGroup().addTo(map);

  // Municipality master groups
  const municipalityMasterGroups = {
    "Dammam": L.layerGroup(),
    "Al Khobar": L.layerGroup(),
    "Dhahran": L.layerGroup()
  };

  const municipalityColors = {
    "Dammam": "#2563eb",
    "Al Khobar": "#dc2626",
    "Dhahran": "#16a34a"
  };

  // district data store
  const districtLayers = {};       // {districtName: geoLayer}
  const districtMarkers = {};      // {districtName: textMarker}
  const districtCityMap = {};      // {districtName: city}
  const districtCoords = {};       // {districtName: {lat,long,count}}

  let treeControl = null;

  function normalizeCityName(city) {
    if (!city) return "Unknown";
    const c = String(city).trim();
    const lower = c.toLowerCase();

    if (lower === "dammam" || c === "الدمام") return "Dammam";
    if (lower === "dhahran" || c === "الظهران") return "Dhahran";
    if (lower === "al khobar" || lower === "khobar" || c === "الخبر") return "Al Khobar";

    return c;
  }

  function createCountMarker(name, lat, long, count) {
    return L.marker([parseFloat(lat), parseFloat(long)], {
      icon: L.divIcon({
        className: "count-label",
        html: `<div class="count-text">${count}</div>`,
        iconSize: [40, 20],
        iconAnchor: [20, 10]
      })
    }).bindTooltip(`<b>${name}</b><br>Total: ${count}`);
  }

  function refreshVisibleCounts() {
    // remove all markers first
    Object.values(districtMarkers).forEach(marker => {
      if (map.hasLayer(marker)) {
        map.removeLayer(marker);
      }
    });

    // add count only if district polygon is visible
    Object.keys(districtLayers).forEach(name => {
      const polygonLayer = districtLayers[name];
      const marker = districtMarkers[name];

      if (polygonLayer && marker && map.hasLayer(polygonLayer)) {
        marker.addTo(map);
      }
    });
  }

  function buildTreeControl(cityDistrictNodes) {
    if (treeControl) {
      map.removeControl(treeControl);
    }

    treeControl = L.control.layers.tree(
      {
        "OpenStreetMap": osm
      },
      {
        label: "Map Layers",
        children: [
          {
            label: "Municipality",
            children: [
              {
                label: "Dammam",
                layer: municipalityMasterGroups["Dammam"],
                children: cityDistrictNodes["Dammam"] || []
              },
              {
                label: "Al Khobar",
                layer: municipalityMasterGroups["Al Khobar"],
                children: cityDistrictNodes["Al Khobar"] || []
              },
              {
                label: "Dhahran",
                layer: municipalityMasterGroups["Dhahran"],
                children: cityDistrictNodes["Dhahran"] || []
              }
            ]
          },
          {
            label: "Boundary",
            layer: boundaryLayer
          }
        ]
      },
      {
        collapsed: false,
        namedToggle: true,
        selectorBack: false
      }
    ).addTo(map);
  }

  fetch("./districts.geojson")
    .then(res => res.json())
    .then(data => {
      const cityDistrictNodes = {
        "Dammam": [],
        "Al Khobar": [],
        "Dhahran": []
      };

      (data.features || []).forEach(f => {
        const city = normalizeCityName(f.properties?.City);
        const name = (f.properties?.Name || "").trim();

        if (!name || !municipalityMasterGroups[city]) return;

        const geo = L.geoJSON(f, {
          style: {
            color: "black",
            weight: 1,
            fillColor: municipalityColors[city],
            fillOpacity: 0.35
          }
        }).bindTooltip(`${name} (${city})`);

        districtLayers[name] = geo;
        districtCityMap[name] = city;

        municipalityMasterGroups[city].addLayer(geo);

        cityDistrictNodes[city].push({
          label: name,
          layer: geo
        });

        boundaryLayer.addLayer(
          L.geoJSON(f, {
            style: {
              color: "black",
              weight: 1,
              fillOpacity: 0
            }
          })
        );

        geo.on("add remove", function () {
          setTimeout(refreshVisibleCounts, 50);
        });

        geo.on("click", function () {
          const info = districtCoords[name];
          if (!info) return;

          window.parent.postMessage({
            type: "mapClick",
            state: name,
            lat: info.lat,
            long: info.long
          }, "*");
        });
      });

      buildTreeControl(cityDistrictNodes);

      // Start with no municipality selected
      map.removeLayer(municipalityMasterGroups["Dammam"]);
      map.removeLayer(municipalityMasterGroups["Al Khobar"]);
      map.removeLayer(municipalityMasterGroups["Dhahran"]);
    })
    .catch(err => {
      console.error("Error loading districts.geojson:", err);
    });

  // Receive query data from Grafana
  // expected:
  // row.state = LocationName
  // row.count = TotalCount
  // row.lat = Lat
  // row.long = Longitude
  window.addEventListener("message", (event) => {
    if (event.data?.type === "incidentData") {
      // clear old markers
      Object.values(districtMarkers).forEach(marker => {
        if (map.hasLayer(marker)) map.removeLayer(marker);
      });

      for (const key in districtMarkers) delete districtMarkers[key];
      for (const key in districtCoords) delete districtCoords[key];

      (event.data.data || []).forEach(row => {
        const name = row.state;
        const count = row.count;
        const lat = row.lat;
        const long = row.long;

        if (name == null || count == null || lat == null || long == null) return;

        districtCoords[name] = {
          lat: parseFloat(lat),
          long: parseFloat(long),
          count: count
        };

        districtMarkers[name] = createCountMarker(
          name,
          parseFloat(lat),
          parseFloat(long),
          count
        );
      });

      refreshVisibleCounts();
    }
  });

  map.on("overlayadd overlayremove", function () {
    setTimeout(refreshVisibleCounts, 50);
  });

  window.parent.postMessage({ type: "iframeReady" }, "*");
});
</script>
</body>
</html>
